<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-container-highest": "#2d3449",
                    "surface-tint": "#adc6ff",
                    "on-surface": "#dbe2fd",
                    "on-error": "#690005",
                    "surface-container": "#171f33",
                    "surface-dim": "#0b1326",
                    "secondary": "#4edea3",
                    "on-secondary-container": "#00311f",
                    "primary-container": "#4d8eff",
                    "on-surface-variant": "#c2c6d6",
                    "tertiary-fixed": "#ffdadb",
                    "tertiary-container": "#ff516a",
                    "surface-container-high": "#222a3e",
                    "on-primary-container": "#00285d",
                    "primary": "#adc6ff",
                    "inverse-on-surface": "#283044",
                    "inverse-surface": "#dbe2fd",
                    "on-primary-fixed": "#001a42",
                    "on-tertiary-container": "#5b0017",
                    "tertiary": "#ffb2b7",
                    "on-secondary-fixed-variant": "#005236",
                    "surface-variant": "#2d3449",
                    "on-tertiary": "#67001b",
                    "surface-bright": "#31394e",
                    "on-tertiary-fixed-variant": "#92002a",
                    "secondary-container": "#00a572",
                    "primary-fixed": "#d8e2ff",
                    "tertiary-fixed-dim": "#ffb2b7",
                    "on-secondary": "#003824",
                    "primary-fixed-dim": "#adc6ff",
                    "outline-variant": "#424754",
                    "on-primary": "#002e6a",
                    "on-primary-fixed-variant": "#004395",
                    "secondary-fixed": "#6ffbbe",
                    "on-tertiary-fixed": "#40000d",
                    "on-background": "#dbe2fd",
                    "error-container": "#93000a",
                    "on-error-container": "#ffdad6",
                    "surface-container-low": "#131b2e",
                    "error": "#ffb4ab",
                    "surface-container-lowest": "#060d20",
                    "background": "#0b1326",
                    "surface": "#0b1326",
                    "secondary-fixed-dim": "#4edea3",
                    "outline": "#8c909f",
                    "on-secondary-fixed": "#002113",
                    "inverse-primary": "#005ac2"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "fontFamily": {
                    "headline": ["Space Grotesk"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        .glass-card {
            background: rgba(34, 42, 62, 0.6);
            backdrop-filter: blur(12px);
        }
        .sos-glow {
            box-shadow: 0 0 40px rgba(244, 63, 94, 0.3);
        }
        .scanning-line {
            position: absolute;
            left: 0;
            width: 100%;
            height: 2px;
            background: rgba(244, 63, 94, 0.5);
            box-shadow: 0 0 10px rgba(244, 63, 94, 0.8);
            animation: scan 4s linear infinite;
        }
        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface selection:bg-tertiary selection:text-on-tertiary overflow-hidden h-screen w-screen flex flex-col">
<!-- Top Navigation Anchor (Manual suppression check: SOS is a critical focused journey, but keeping minimal sentinel branding for identity) -->
<header class="fixed top-0 w-full z-50 bg-[#0B1326]/60 backdrop-blur-md flex justify-between items-center h-16 px-6 w-full shadow-[0_1px_0_0_rgba(219,226,253,0.05)]">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-[#3B82F6]" data-icon="radar">radar</span>
<span class="text-sm font-bold tracking-[0.2em] text-[#DBE2FD] font-headline uppercase">Sentinel Lens</span>
</div>
<div class="font-['Space_Grotesk'] uppercase tracking-widest text-xs text-[#DBE2FD]/60">
            12:48 UTC
        </div>
</header>
<!-- Main Tactical Canvas -->
<main class="flex-1 flex flex-col pt-20 pb-24 px-6 relative overflow-hidden">
<!-- Background Ambient Element -->
<div class="absolute inset-0 opacity-10 pointer-events-none">
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-tertiary rounded-full blur-[120px]"></div>
</div>
<!-- Telemetry Header -->
<div class="grid grid-cols-2 gap-4 mb-8">
<div class="flex flex-col">
<span class="font-label text-[10px] uppercase tracking-tighter text-on-surface-variant">System Status</span>
<span class="font-headline text-lg font-bold text-tertiary tracking-tight">CRITICAL ALERT</span>
</div>
<div class="flex flex-col text-right">
<span class="font-label text-[10px] uppercase tracking-tighter text-on-surface-variant">Nearest Exit</span>
<span class="font-headline text-lg font-bold text-tertiary tracking-tight">GATE 3</span>
</div>
</div>
<!-- Central SOS Trigger -->
<div class="flex-1 flex flex-col items-center justify-center relative">
<div class="relative group">
<!-- Outer Ring -->
<div class="absolute inset-0 -m-8 border border-tertiary/20 rounded-full animate-pulse"></div>
<div class="absolute inset-0 -m-4 border border-tertiary/40 rounded-full"></div>
<!-- Main Glass Trigger -->
<div class="relative w-64 h-64 rounded-full glass-card flex items-center justify-center sos-glow overflow-hidden cursor-pointer active:scale-95 transition-all duration-300">
<div class="scanning-line"></div>
<div class="flex flex-col items-center gap-1 z-10">
<span class="font-headline text-6xl font-extrabold text-tertiary tracking-tighter">SOS</span>
<span class="font-label text-[10px] uppercase tracking-widest text-tertiary/80">Hold to Signal</span>
</div>
</div>
</div>
<!-- Coordinate Telemetry -->
<div class="mt-12 text-center">
<div class="font-headline text-2xl font-medium text-on-surface tracking-widest">
                    40.7128° N | 74.0060° W
                </div>
<div class="mt-2 font-label text-[10px] uppercase tracking-[0.3em] text-on-surface-variant">
                    Tracking Terminal ID: SENT-99-AX
                </div>
</div>
</div>
<!-- Quick Assistance Grid -->
<div class="mt-auto grid grid-cols-4 gap-3">
<button class="glass-card aspect-square rounded-xl flex flex-col items-center justify-center border border-tertiary/5 hover:border-tertiary/40 transition-all group">
<span class="material-symbols-outlined text-tertiary mb-2 text-2xl" data-icon="medical_services">medical_services</span>
<span class="font-label text-[9px] uppercase font-bold tracking-tighter text-on-surface-variant group-hover:text-tertiary transition-colors">Medical</span>
</button>
<button class="glass-card aspect-square rounded-xl flex flex-col items-center justify-center border border-tertiary/5 hover:border-tertiary/40 transition-all group">
<span class="material-symbols-outlined text-tertiary mb-2 text-2xl" data-icon="policy">policy</span>
<span class="font-label text-[9px] uppercase font-bold tracking-tighter text-on-surface-variant group-hover:text-tertiary transition-colors">Security</span>
</button>
<button class="glass-card aspect-square rounded-xl flex flex-col items-center justify-center border border-tertiary/5 hover:border-tertiary/40 transition-all group">
<span class="material-symbols-outlined text-tertiary mb-2 text-2xl" data-icon="cleaning_services">cleaning_services</span>
<span class="font-label text-[9px] uppercase font-bold tracking-tighter text-on-surface-variant group-hover:text-tertiary transition-colors">Spill</span>
</button>
<button class="glass-card aspect-square rounded-xl flex flex-col items-center justify-center border border-tertiary/5 hover:border-tertiary/40 transition-all group">
<span class="material-symbols-outlined text-tertiary mb-2 text-2xl" data-icon="support_agent">support_agent</span>
<span class="font-label text-[9px] uppercase font-bold tracking-tighter text-on-surface-variant group-hover:text-tertiary transition-colors">Staff</span>
</button>
</div>
</main>
<!-- Bottom Navigation Shell (Suppressing per task mandate as this is a focused Emergency journey) -->
<!-- Replaced with a 'Cancel/Back' tether for transaction-focused exit -->
<div class="fixed bottom-0 w-full z-50 pb-safe bg-[#0B1326]/80 backdrop-blur-lg flex justify-around items-center h-20 px-4 shadow-[0_-4px_20px_rgba(0,0,0,0.5)]">
<button class="flex flex-col items-center justify-center text-[#DBE2FD]/40 active:scale-90 transition-all duration-300">
<span class="material-symbols-outlined mb-1" data-icon="close">close</span>
<span class="font-['Inter'] text-[10px] font-bold uppercase tracking-tighter">Cancel Signal</span>
</button>
<!-- The Alerts tab might be logically mapped if the user is viewing recent broadcasts -->
<button class="flex flex-col items-center justify-center text-[#3B82F6] drop-shadow-[0_0_10px_rgba(59,130,246,0.6)] scale-110 active:scale-90 transition-all duration-300">
<span class="material-symbols-outlined mb-1" data-icon="notifications">notifications</span>
<span class="font-['Inter'] text-[10px] font-bold uppercase tracking-tighter">Alerts</span>
</button>
</div>
<!-- Background texture and overlay -->
<div class="fixed inset-0 z-[-1] pointer-events-none opacity-[0.03]" data-alt="fine digital noise and grid overlay for a high-tech tactical operating system interface"></div>
</body></html>
