# Retrieve all upcoming and past events
query ListEvents @auth(level: PUBLIC) {
  events(orderBy: [{ startTime: DESC }]) {
    id
    title
    venueName
    venueLat
    venueLng
    description
    startTime
    expiryDate
    bannerUrl
    isActive
    minAge
    layoutId
    layoutConfig
  }
}

# Get the currently active event for the Guest PWA
query GetActiveEvent @auth(level: PUBLIC) {
  events(where: { isActive: { eq: true } }, limit: 1) {
    id
    title
    venueName
    venueLat
    venueLng
    expiryDate
    bannerUrl
  }
}

# Fetch emergency events filtered by a specific event ID for the monitoring dashboard
query GetEmergencyEvents($eventId: UUID) @auth(level: PUBLIC) {
  emergencyEvents(
    where: { eventId: { eq: $eventId } },
    orderBy: [{ timestamp: DESC }], 
    limit: 100
  ) {
    id
    type
    priority
    details
    lat
    lng
    timestamp
    status
    eventId
  }
}
# Venue Layout Queries
query ListVenueLayouts @auth(level: PUBLIC) {
  venueLayouts(orderBy: [{ createdAt: DESC }]) {
    id
    name
    elements
    createdAt
  }
}

query GetVenueLayout($id: UUID!) @auth(level: PUBLIC) {
  venueLayout(id: $id) {
    id
    name
    elements
    createdAt
  }
}
query ListTickets($eventId: UUID) @auth(level: PUBLIC) {
  tickets(where: { eventId: { eq: $eventId } }, orderBy: [{ issuedAt: DESC }]) {
    id
    guestName
    guestEmail
    guestAge
    guestMobile
    guestIdNumber
    gate
    section
    row
    seat
    issuedAt
    status
    eventId
  }
}

query GetUserProfile($id: String!) @auth(level: USER) {
  userProfile(id: $id) {
    id
    name
    age
    idCardNumber
    phone
    email
  }
}

query GetGuestTickets($userId: String!) @auth(level: USER) {
  tickets(where: { userId: { eq: $userId } }, orderBy: [{ issuedAt: DESC }]) {
    id
    gate
    section
    row
    seat
    issuedAt
    status
    eventId
    event {
      id
      title
      bannerUrl
      venueName
      startTime
      isActive
      layoutId
    }
  }
}

query GetTicket($id: UUID!) @auth(level: USER) {
  ticket(id: $id) {
    id
    guestName
    guestEmail
    guestAge
    guestMobile
    guestIdNumber
    gate
    section
    row
    seat
    issuedAt
    status
    eventId
    event {
      id
      title
      venueName
      startTime
      isActive
    }
  }
}
query GetSystemAlerts($eventId: UUID) @auth(level: PUBLIC) {
  eventAlerts: emergencyEvents(
    where: { eventId: { eq: $eventId } },
    orderBy: [{ timestamp: DESC }],
    limit: 50
  ) {
    id
    type
    priority
    details
    timestamp
    status
    eventId
  }
  communityAlerts: emergencyEvents(
    where: { eventId: { eq: null } },
    orderBy: [{ timestamp: DESC }],
    limit: 50
  ) {
    id
    type
    priority
    details
    timestamp
    status
    eventId
  }
}
