# Log an emergency signal from a guest or staff device
mutation LogEmergencyEvent(
  $type: String!, 
  $priority: String!, 
  $details: String!, 
  $lat: Float, 
  $lng: Float,
  $eventId: UUID
) @auth(level: PUBLIC) {
  emergencyEvent_insert(data: {
    type: $type,
    priority: $priority,
    details: $details,
    lat: $lat,
    lng: $lng,
    eventId: $eventId,
    status: "PENDING"
  })
}

# Create a new event and set its venue parameters
mutation CreateEvent(
  $title: String!,
  $venueName: String!,
  $venueLat: Float!,
  $venueLng: Float!,
  $description: String,
  $isActive: Boolean = false
) @auth(level: PUBLIC) {
  event_insert(data: {
    title: $title,
    venueName: $venueName,
    venueLat: $venueLat,
    venueLng: $venueLng,
    description: $description,
    isActive: $isActive
  })
}

# Toggle an event as the active one for the tactical dashboard
mutation SetActiveEvent($id: UUID!, $isActive: Boolean!) @auth(level: PUBLIC) {
  event_update(id: $id, data: {
    isActive: $isActive
  })
}
