# Log an emergency signal from a guest or staff device
mutation LogEmergencyEvent(
  $type: String!, 
  $priority: String!, 
  $details: String!, 
  $lat: Float, 
  $lng: Float,
  $eventId: UUID
) @auth(level: PUBLIC) {
  emergencyEvent_insert(data: {
    type: $type,
    priority: $priority,
    details: $details,
    lat: $lat,
    lng: $lng,
    eventId: $eventId,
    status: "PENDING"
  })
}

# Create a new event and set its venue parameters
mutation CreateEvent(
  $title: String!,
  $venueName: String!,
  $venueLat: Float!,
  $venueLng: Float!,
  $description: String,
  $isActive: Boolean = false,
  $minAge: Int = 0,
  $layoutId: UUID = null,
  $layoutConfig: String = null,
  $startTime: Timestamp = null,
  $expiryDate: Timestamp = null,
  $bannerUrl: String = null
) @auth(level: PUBLIC) {
  event_insert(data: {
    title: $title,
    venueName: $venueName,
    venueLat: $venueLat,
    venueLng: $venueLng,
    description: $description,
    isActive: $isActive,
    minAge: $minAge,
    layoutId: $layoutId,
    layoutConfig: $layoutConfig,
    startTime: $startTime,
    expiryDate: $expiryDate,
    bannerUrl: $bannerUrl
  })
}

# Ticket Issuance
mutation IssueTicket(
  $eventId: UUID!,
  $gate: String!,
  $section: String!,
  $row: String!,
  $seat: String!,
  $guestName: String!,
  $guestAge: Int!,
  $guestIdNumber: String!,
  $guestMobile: String!,
  $guestEmail: String!,
  $userId: String = null
) @auth(level: PUBLIC) {
  ticket_insert(data: {
    eventId: $eventId,
    gate: $gate,
    section: $section,
    row: $row,
    seat: $seat,
    guestName: $guestName,
    guestAge: $guestAge,
    guestIdNumber: $guestIdNumber,
    guestMobile: $guestMobile,
    guestEmail: $guestEmail,
    userId: $userId,
    status: "ACTIVE"
  }) {
    id
  }
}

# Venue Layout CRUD
mutation CreateVenueLayout($name: String!, $elements: String!) @auth(level: PUBLIC) {
  venueLayout_insert(data: {
    name: $name,
    elements: $elements
  }) {
    id
  }
}

mutation UpdateVenueLayout($id: UUID!, $name: String, $elements: String) @auth(level: PUBLIC) {
  venueLayout_update(id: $id, data: {
    name: $name,
    elements: $elements
  }) {
    id
  }
}

mutation DeleteVenueLayout($id: UUID!) @auth(level: PUBLIC) {
  venueLayout_delete(id: $id)
}

mutation DeleteEvent($id: UUID!) @auth(level: PUBLIC) {
  event_delete(id: $id)
}

mutation DeleteTicketsByEvent($eventId: UUID!) @auth(level: PUBLIC) {
  ticket_deleteMany(where: { eventId: { eq: $eventId } })
}

mutation DeleteEmergencyEventsByEvent($eventId: UUID!) @auth(level: PUBLIC) {
  emergencyEvent_deleteMany(where: { eventId: { eq: $eventId } })
}

# Toggle an event as the active one for the tactical dashboard
mutation SetActiveEvent($id: UUID!, $isActive: Boolean!) @auth(level: PUBLIC) {
  event_update(id: $id, data: {
    isActive: $isActive
  })
}

# User Profile Operations
mutation UpsertUserProfile(
  $id: String!,
  $name: String!,
  $age: Int!,
  $idCardNumber: String!,
  $phone: String!,
  $email: String!
) @auth(level: PUBLIC) {
  userProfile_upsert(data: {
    id: $id,
    name: $name,
    age: $age,
    idCardNumber: $idCardNumber,
    phone: $phone,
    email: $email
  })
}

# Link a ticket to a user ID
mutation ClaimTicket($id: UUID!, $userId: String!) @auth(level: PUBLIC) {
  ticket_update(id: $id, data: {
    userId: $userId
  })
}
